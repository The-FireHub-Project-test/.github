name: 🐞 Bug Report
description: Report a bug in the FireHub ecosystem (Core, Runtime, Adapters, Capabilities)
title: ""
type: Bug

body:

  - type: dropdown
    id: area
    attributes:
      label: "Affected Area"
      description: Select the FireHub layer affected by this bug.
      options:
        - Core
        - Runtime Foundation
        - Adapter Layer
        - Capability Layer
        - Skeleton / Template
        - Meta / Governance
        - Other
    validations:
      required: true

  - type: input
    id: firehub-version
    attributes:
      label: "FireHub Version"
      description: Version of FireHub where the issue occurs.
      placeholder: "e.g. v1.2.0"
    validations:
      required: true
      
  - type: textarea
    id: component-versions
    attributes:
      label: "Component Versions"
      description: |
        Specify exact versions of affected FireHub components.
        Example:
        Core: v1.2.0
        Runtime Foundation: v0.9.3
        Autoload Capability: v0.3.1
      value: |
        Core:
        Runtime Foundation:
        Adapter Layer:
        Capability Module:
        Other:
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: "PHP Version"
      description: PHP version used in the environment.
      placeholder: "e.g. 8.5.0"
    validations:
      required: true

  - type: checkboxes
    id: precheck
    attributes:
      label: "Pre-check"
      description: Confirm before submitting
      options:
        - label: I have searched existing issues
          required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: "Expected Behavior"
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: "Actual Behavior"
      description: What actually happened instead.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: "Steps to Reproduce"
      description: Steps required to reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      value: |
        - OS:
        - PHP SAPI:
        - Runtime Mode:
        - Deployment Type (Container / Bare metal / CI):
      render: markdown
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: "Logs / Stack Trace"
      description: Add any relevant logs or error traces.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: Screenshots, references, or other useful information.
    validations:
      required: false
